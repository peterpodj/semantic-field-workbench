<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Field Workbench</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Serif:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Modules -->
  <script src="sim.js"></script>
  <script src="ui.js"></script>
  <script src="tweaks-panel.js"></script>
  <script src="sandbox.js"></script>
  <script src="sections.js"></script>
  <script src="concept-map.js"></script>
  <script src="it-apps.js"></script>
  <script src="app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Wait briefly for KaTeX to load from CDN
      const boot = () => {
        if (typeof katex === 'undefined') {
          setTimeout(boot, 50);
          return;
        }
        App.init();
        // Auto-render any remaining inline math
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      };
      boot();
    });
  </script>
</body>
</html>
